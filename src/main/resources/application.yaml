spring:
  application:
    name: signature-app

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/signature_app}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}